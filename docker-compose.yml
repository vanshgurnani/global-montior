version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: gim-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: gim-backend
    env_file:
      - ./backend/.env.example
    environment:
      MONGODB_URL: mongodb://mongo:27017
      MONGODB_DB_NAME: gim
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: gim-frontend
    env_file:
      - ./frontend/.env.example
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo_data:
