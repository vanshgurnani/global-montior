services:
  - type: web
    name: global-montior-backend
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2"
    
    # Health check
    healthCheckPath: /health
    healthCheckInterval: 30
    
    # Environment variables
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: SCHEDULER_ENABLED
        value: "true"
      - key: SCHEDULER_INTERVAL_MINUTES
        value: "15"
      - key: MONGODB_DB_NAME
        value: gim
      
      # Database (use MongoDB Atlas)
      - key: MONGODB_URL
        fromDatabase:
          name: mongodb-atlas
          property: connectionString
      
      # API Keys - set these in Render dashboard
      - key: NEWS_API_KEY
        fromSecret: NEWS_API_KEY
      - key: YOUTUBE_API_KEY
        fromSecret: YOUTUBE_API_KEY
      - key: OPENAI_API_KEY
        fromSecret: OPENAI_API_KEY
      
      # CORS
      - key: CORS_ORIGINS
        value: "https://global-montior.vercel.app"
    
    # Timeout settings (optimized for Render)
    timeout: 3600  # Request timeout in seconds
    
    # Resource limits
    disk:
      size: 100  # in GB

databases:
  - name: mongodb-atlas
    engine: mongodb
    tier: free
    plan: starter
